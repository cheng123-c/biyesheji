spring:
  application:
    name: biyesheji-backend

  # 数据库配置
  datasource:
    url: jdbc:mysql://mysql_bs:3306/biyesheji?useUnicode=true&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # MyBatis 配置
  mybatis:
    mapper-locations: classpath:mapper/*.xml
    type-aliases-package: com.health.assessment.entity
    configuration:
      map-underscore-to-camel-case: true
      use-generated-keys: true
      cache-enabled: true
      lazy-loading-enabled: true
      aggressive-lazy-loading: false
      multiple-result-sets-enabled: true

  # CORS 配置
  mvc:
    cors:
      allowed-origins: "http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:8080"
      allowed-methods: "*"
      allowed-headers: "*"
      allow-credentials: true

  # Jackson JSON 配置
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      write-date-timestamps-as-nanoseconds: false
    deserialization:
      fail-on-unknown-properties: false
      adjust-dates-to-context-time-zone: false
    date-format: "yyyy-MM-dd HH:mm:ss"
    time-zone: Asia/Shanghai

# MyBatis Plus 分页配置
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

# JWT 配置
jwt:
  secret: "${JWT_SECRET:the-secret-key-change-in-production-must-be-at-least-64-characters-long-for-hs512-algorithm-security}"
  expiration: 86400000  # 24小时
  refresh-expiration: 604800000  # 7天

# DeepSeek AI 配置
deepseek:
  api:
    endpoint: "${DEEPSEEK_API_ENDPOINT:https://api.deepseek.com/v1}"
    key: "${DEEPSEEK_API_KEY:}"
    model: deepseek-chat
    timeout: 30000
    max-retries: 3

server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024

logging:
  level:
    root: INFO
    com.health.assessment: DEBUG
    org.mybatis: INFO
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 10

# API 文档配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: false

