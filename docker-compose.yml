version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: biyesheji-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: biyesheji
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: 'Asia/Shanghai'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - biyesheji-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      timeout: 20s
      retries: 10
      interval: 10s
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7.2-alpine
    container_name: biyesheji-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - biyesheji-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5
      interval: 5s
    restart: unless-stopped

  # RabbitMQ 消息队列（可选）
  # rabbitmq:
  #   image: rabbitmq:3.12-management-alpine
  #   container_name: biyesheji-rabbitmq
  #   environment:
  #     RABBITMQ_DEFAULT_USER: guest
  #     RABBITMQ_DEFAULT_PASS: guest
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"
  #   networks:
  #     - biyesheji-network
  #   restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  biyesheji-network:
    driver: bridge

